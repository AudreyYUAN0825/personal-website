<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Resume Reference</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 13px;
    width: 420px;
    max-height: 600px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: #f8f9fa;
    color: #1a1a1a;
  }

  /* ── Header ────────────────────────────────────────────────────────────── */
  .header {
    background: #1e3a2f;
    color: white;
    padding: 12px 14px 10px;
    flex-shrink: 0;
  }
  .header-name { font-size: 15px; font-weight: 700; letter-spacing: 0.01em; }
  .header-sub  { font-size: 11px; opacity: 0.7; margin-top: 2px; }

  /* ── Tab bar ────────────────────────────────────────────────────────────── */
  .tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e5e7eb;
    flex-shrink: 0;
  }
  .tab {
    flex: 1;
    padding: 8px 4px;
    text-align: center;
    font-size: 11.5px;
    font-weight: 500;
    color: #6b7280;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab:hover  { color: #1e3a2f; }
  .tab.active { color: #1e3a2f; border-bottom-color: #1e3a2f; font-weight: 600; }

  /* ── Scrollable content ─────────────────────────────────────────────────── */
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px 16px;
  }

  /* ── Sections ───────────────────────────────────────────────────────────── */
  .section { margin-bottom: 14px; }
  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #9ca3af;
    margin-bottom: 6px;
    padding-bottom: 4px;
    border-bottom: 1px solid #f0f0f0;
  }

  /* ── Row (label + copyable value) ──────────────────────────────────────── */
  .row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 6px;
    border-radius: 6px;
    margin-bottom: 2px;
    transition: background 0.1s;
  }
  .row:hover { background: #f0faf4; }

  .row-label {
    font-size: 10.5px;
    color: #9ca3af;
    min-width: 72px;
    padding-top: 1px;
    flex-shrink: 0;
  }
  .row-value {
    font-size: 12.5px;
    color: #111827;
    flex: 1;
    line-height: 1.45;
    word-break: break-word;
    cursor: pointer;
    border-radius: 4px;
    padding: 1px 4px;
  }
  .row-value:hover { background: #d1fae5; }
  .row-value.copied {
    background: #bbf7d0 !important;
    color: #166534;
  }
  .row-value.multiline { white-space: pre-line; }

  /* ── Copy hint ──────────────────────────────────────────────────────────── */
  .copy-hint {
    font-size: 10px;
    color: #9ca3af;
    text-align: center;
    padding: 6px 0 2px;
  }

  /* ── Card (for multi-entry sections like edu / exp) ─────────────────────── */
  .card {
    background: #fff;
    border: 1px solid #e9ecef;
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 8px;
  }
  .card-title {
    font-size: 12.5px;
    font-weight: 600;
    color: #1e3a2f;
    margin-bottom: 2px;
  }
  .card-sub {
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 7px;
  }

  /* ── Bullet list ────────────────────────────────────────────────────────── */
  .bullets {
    margin-top: 4px;
    cursor: pointer;
    padding: 6px 8px;
    background: #f9fafb;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
    font-size: 11.5px;
    line-height: 1.55;
    color: #374151;
  }
  .bullets:hover  { background: #d1fae5; border-color: #6ee7b7; }
  .bullets.copied { background: #bbf7d0; color: #166534; }
  .bullet-item::before { content: "• "; }

  /* ── Toast ──────────────────────────────────────────────────────────────── */
  .toast {
    position: fixed;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: #1e3a2f;
    color: #fff;
    font-size: 11.5px;
    padding: 5px 14px;
    border-radius: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
    z-index: 999;
  }
  .toast.show { opacity: 1; }

  /* ── Tab panels ─────────────────────────────────────────────────────────── */
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── Tag chips ──────────────────────────────────────────────────────────── */
  .tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .tag {
    font-size: 10px;
    background: #ecfdf5;
    color: #065f46;
    border: 1px solid #a7f3d0;
    border-radius: 4px;
    padding: 1px 6px;
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-name" id="headerName">Qihui Yuan · 袁齐惠</div>
  <div class="header-sub" id="headerSub">Click any value to copy · 点击任意字段复制</div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="personal">Personal</div>
  <div class="tab" data-tab="education">Education</div>
  <div class="tab" data-tab="experience">Experience</div>
  <div class="tab" data-tab="more">More</div>
</div>

<div class="content">
  <!-- Personal -->
  <div class="tab-panel active" id="tab-personal">
    <p class="copy-hint">点击任意字段即可复制到剪贴板</p>
    <div id="personalContent"></div>
  </div>

  <!-- Education -->
  <div class="tab-panel" id="tab-education">
    <div id="educationContent"></div>
  </div>

  <!-- Experience -->
  <div class="tab-panel" id="tab-experience">
    <div id="experienceContent"></div>
  </div>

  <!-- More (Projects / Languages / Skills / Tagline) -->
  <div class="tab-panel" id="tab-more">
    <div id="moreContent"></div>
  </div>
</div>

<div class="toast" id="toast">已复制 ✓</div>

<script src="popup.js"></script>
</body>
</html>
